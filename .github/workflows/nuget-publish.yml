name: Nuget Publish
on:
  workflow_dispatch:
jobs:
  pre_clean:
    name: pre_clean
    runs-on: self-hosted
    container:
      image: alpine
    steps:
      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
  build:
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    name: build
    runs-on: self-hosted
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Run the copy env script
        run: ./scripts/development/copy_env.sh
        shell: bash
      - name: Docker compose build
        run: ./scripts/development/docker_build.sh
        shell: bash
      - name: Docker compose up
        run: ./scripts/development/docker_up.sh
        shell: bash
      - name: ASP.NET build
        run: docker exec -it caspnetti_package_development sh -c "cd Wryco.EFirst && dotnet pack"
        shell: bash
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: NuGet push
        run: dotnet nuget push artifacts/my-sdk.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
      - name: Docker compose down
        run: ./scripts/development/docker_down.sh
        shell: bash
  post_clean:
    name: post_clean
    runs-on: self-hosted
    container:
      image: alpine
    steps:
      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
