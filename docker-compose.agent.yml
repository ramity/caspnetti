services:

  caspnetti_agent_development:
    build:
      context: ./docker/development/agent
      dockerfile: Dockerfile
    container_name: caspnetti_agent_development
    image: caspnetti_agent_development
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/development/agent/data:/root/.cache/huggingface
      - ./:/caspnetti
    networks:
      - caspnetti_development
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    command: --model Qwen/Qwen3-0.6B

  caspnetti_agent_ui_development:
    build:
      context: ./docker/development/agent-ui
      dockerfile: Dockerfile
    container_name: caspnetti_agent_ui_development
    depends_on:
      - caspnetti_agent_development
    image: caspnetti_agent_ui_development
    volumes:
      - ./docker/development/agent-ui/data:/app/backend/data
    networks:
      - caspnetti_development
    ports:
      - "8080:8080"
    environment:
      - WEBUI_AUTH=False
      - OPENAI_API_BASE_URL=http://caspnetti_agent_development:8000
      - USE_CUDA_DOCKER=true

networks:

  caspnetti_development:
    external: true
    name: caspnetti_development
